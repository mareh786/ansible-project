---
- name: Install application user
  ansible.builtin.user:
    name: appuser
    groups: www-data
    append: yes
    shell: /bin/bash
    state: present
  tags: app

- name: Create application directory
  ansible.builtin.file:
    path: /opt/myapp
    state: directory
    owner: appuser
    group: www-data
    mode: '0755'
  tags: app

- name: Clone GIT repo
  ansible.builtin.git:
    repo: https://github.com/mareh786/snake-app.git
    dest: /opt/myapp
    version: main
    force: yes
    update: yes
  become: yes
  become_user: appuser
  tags: app

- name: Install application Dependencies
  ansible.builtin.command: python3 -m venv /opt/myapp/venv
  args: 
    creates: /opt/myapp/venv/bin/activate
  become: yes
  become_user: appuser
  tags: app

