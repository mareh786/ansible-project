---
- name: Create application user
  ansible.builtin.user:
    name: appuser
    groups: www-data
    append: yes
    shell: /bin/bash
    state: present
  tags: app

- name: Create application directory
  ansible.builtin.file:
    path: /opt/myapp
    state: directory
    owner: appuser
    group: www-data
    mode: '0755'
  tags: app

- name: Install required packages
  ansible.builtin.apt:
    name:
    - git
    - python3-venv
    - python3-pip
    state: present
    update_cache: yes
  become: yes
  tags: app

- name: Deploy application from Git
  ansible.builtin.git:
    repo: https://github.com/mareh786/snake-app.git   
    dest: /opt/myapp
    version: main
    force: yes
  become: yes
  become_user: appuser
  tags: app

- name: Create virtual environment
  ansible.builtin.command: python3 -m venv /opt/myapp/venv
  args:
    creates: /opt/myapp/venv/bin/activate
  become: yes
  become_user: appuser
  tags: app

- name: Install Python requirements
  ansible.builtin.pip:
    requirements: /opt/myapp/requirements.txt
    virtualenv: /opt/myapp/venv
    virtualenv_command: /usr/bin/python3 -m venv
  become: yes
  become_user: appuser
  tags: app

- name: Create systemd service for Flask app
  ansible.builtin.template:
    src: app.service.j2
    dest: /etc/systemd/system/myapp.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart myapp service
  tags: app
- name: Start app if not running
  ansible.builtin.shell: |
    pgrep -f "app.py" || nohup /opt/myapp/venv/bin/python app.py > /opt/myapp/app.log 2>&1 &
  args:
    chdir: /opt/myapp
